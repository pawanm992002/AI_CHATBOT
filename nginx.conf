upstream backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    server_name chatbot.acadiq.ai;

    client_max_body_size 100M;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml
        image/svg+xml;

    # location /static/ {
    #     alias /home/lb/AI_CHATBOT/apps/widget/dist/; # Change this alias path when moving project to different 
    #     expires 1y;
    #     add_header Cache-Control "public, no-transform";
    # }

    # location /dashboard/assets/ {
    #     alias /home/lb/AI_CHATBOT/apps/dashboard/dist/assets/; # Change this alias path when moving project to different
    #     expires 1y;
    #     add_header Cache-Control "public, no-transform";
    # }

    # location /dashboard/ { 
    #     alias /home/lb/AI_CHATBOT/apps/dashboard/dist/; # Change this alias path when moving project to different
    #     try_files $uri $uri/ /dashboard/index.html;
    # }

    location / {

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/chatbot.acadiq.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/chatbot.acadiq.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = chatbot.acadiq.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name chatbot.acadiq.ai;
    return 404; # managed by Certbot

}
