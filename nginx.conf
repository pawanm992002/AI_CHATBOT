upstream backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

server {
    listen 80;
    server_name 164.52.215.191;

    client_max_body_size 100M;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        text/xml
        image/svg+xml;

    location /static/ {
        alias /home/pawanm992002/Documents/Schoollog/AI_Chatbot_widget/apps/widget/dist/;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    location /dashboard/assets/ {
        alias /home/pawanm992002/Documents/Schoollog/AI_Chatbot_widget/apps/dashboard/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    location /dashboard/ {
        alias /home/pawanm992002/Documents/Schoollog/AI_Chatbot_widget/apps/dashboard/dist/;
        try_files $uri $uri/ /dashboard/index.html;
    }

    location / {

        proxy_pass http://backend;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }
}